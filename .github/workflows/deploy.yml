# =============================================================================
# Deploy papermantra-infra to the production VPS.
#
# Triggered by:
#   • push to main (infra config changes)
#   • workflow_dispatch (manual redeploy)
#   • repository_dispatch from app repos (optional image tag bump)
#
# Required GitHub Secrets:
#   PROD_SSH_HOST, PROD_SSH_USER, PROD_SSH_KEY
#   GHCR_TOKEN (read packages — PAT or fine-grained token)
#
# Optional repository variables:
#   INFRA_DEPLOY_PATH  default: /opt/papermantra-infra
# =============================================================================

name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'docker-compose*.yml'
      - '.env'
      - 'nginx/**'
      - 'certbot/**'
      - 'scripts/**'
      - 'monitoring/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to pin (e.g. v1.0.6). Leave empty to deploy current .env tags.'
        required: false
        default: ''
      pin_all:
        description: 'Pin ALL services to image_tag (unified release). If false, use deploy_service only.'
        type: boolean
        required: false
        default: false
      deploy_service:
        description: 'Single service when pin_all=false (portal|website|api|pdf). Ignored when pin_all=true.'
        required: false
        default: 'all'
  repository_dispatch:
    types: [deploy-infra]

concurrency:
  group: papermantra-infra-deploy
  cancel-in-progress: false

env:
  DEPLOY_PATH: ${{ vars.INFRA_DEPLOY_PATH || '/opt/papermantra-infra' }}

jobs:
  deploy:
    name: Deploy to VPS
    # Set repo variable DEPLOY_RUNNER=self-hosted after installing the runner
    # (scripts/install-github-runner.sh) to avoid GitHub→VPS SSH timeouts permanently.
    runs-on: ${{ vars.DEPLOY_RUNNER == 'self-hosted' && fromJson('["self-hosted", "papermantra-prod"]') || 'ubuntu-latest' }}
    timeout-minutes: 30
    environment:
      name: production
      url: https://papermantra.com

    env:
      CI_PIN_TAG: ${{ github.event.inputs.image_tag || github.event.client_payload.pin_tag || github.event.client_payload.version || '' }}
      CI_PIN_ALL: ${{ github.event.inputs.pin_all || github.event.client_payload.pin_all || 'false' }}
      CI_SOURCE: ${{ github.event.client_payload.source || 'manual' }}
      CI_EVENT_NAME: ${{ github.event_name }}
      CI_DEPLOY_SERVICE: ${{ github.event.inputs.deploy_service || 'all' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deploy services
        id: resolve
        run: |
          set -euo pipefail
          SOURCE="${{ github.event.client_payload.source || 'manual' }}"
          PIN_TAG="${{ github.event.inputs.image_tag || github.event.client_payload.pin_tag || github.event.client_payload.version || '' }}"
          PIN_ALL="${{ github.event.inputs.pin_all || github.event.client_payload.pin_all || 'false' }}"
          EVENT_NAME="${{ github.event_name }}"
          DEPLOY_SERVICE_INPUT="${{ github.event.inputs.deploy_service || 'all' }}"

          SERVICES="portal,website,api,pdf"

          if [[ "${SOURCE}" == "manual" && -z "${PIN_TAG}" ]]; then
            if [[ "${EVENT_NAME}" == "push" ]]; then
              DETECTED="$(bash ./scripts/resolve-deploy-services.sh)"
              if [[ -n "${DETECTED}" ]]; then
                SERVICES="${DETECTED}"
              fi
            elif [[ "${DEPLOY_SERVICE_INPUT}" != "all" && -n "${DEPLOY_SERVICE_INPUT}" ]]; then
              SERVICES="${DEPLOY_SERVICE_INPUT}"
            fi
          elif [[ -n "${PIN_TAG}" ]]; then
            if [[ "${PIN_ALL}" == "true" ]]; then
              SERVICES="portal,website,api,pdf"
            elif [[ "${SOURCE}" != "manual" ]]; then
              case "${SOURCE}" in
                papermantra) SERVICES="portal" ;;
                robofume) SERVICES="website" ;;
                papermantraservices) SERVICES="api" ;;
                pdfgenerator) SERVICES="pdf" ;;
              esac
            elif [[ "${DEPLOY_SERVICE_INPUT}" != "all" && -n "${DEPLOY_SERVICE_INPUT}" ]]; then
              SERVICES="${DEPLOY_SERVICE_INPUT}"
            fi
          fi

          echo "services=${SERVICES}" >> "${GITHUB_OUTPUT}"
          echo "Smoke tests will target: ${SERVICES}"

      - name: Deploy on VPS (self-hosted runner)
        if: vars.DEPLOY_RUNNER == 'self-hosted'
        env:
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          GHCR_PAT: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          bash "${DEPLOY_PATH}/scripts/ci-deploy.sh"

      - name: Deploy via SSH (attempt 1)
        if: vars.DEPLOY_RUNNER != 'self-hosted'
        id: ssh_deploy_1
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_PAT: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 30m
          envs: GHCR_PAT,GHCR_USER,CI_PIN_TAG,CI_PIN_ALL,CI_SOURCE,CI_EVENT_NAME,CI_DEPLOY_SERVICE
          script: |
            set -euo pipefail
            export DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
            cd "${DEPLOY_PATH}"
            git fetch origin main
            git reset --hard origin/main
            chmod +x scripts/*.sh certbot/*.sh
            export CI_PIN_TAG="${CI_PIN_TAG}"
            export CI_PIN_ALL="${CI_PIN_ALL}"
            export CI_SOURCE="${CI_SOURCE}"
            export CI_EVENT_NAME="${CI_EVENT_NAME}"
            export CI_DEPLOY_SERVICE="${CI_DEPLOY_SERVICE}"
            ./scripts/ci-deploy.sh

      - name: Deploy via SSH (attempt 2)
        if: vars.DEPLOY_RUNNER != 'self-hosted' && steps.ssh_deploy_1.outcome == 'failure'
        id: ssh_deploy_2
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_PAT: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 30m
          envs: GHCR_PAT,GHCR_USER,CI_PIN_TAG,CI_PIN_ALL,CI_SOURCE,CI_EVENT_NAME,CI_DEPLOY_SERVICE
          script: |
            sleep 45
            set -euo pipefail
            export DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
            cd "${DEPLOY_PATH}"
            git fetch origin main
            git reset --hard origin/main
            chmod +x scripts/*.sh certbot/*.sh
            export CI_PIN_TAG="${CI_PIN_TAG}"
            export CI_PIN_ALL="${CI_PIN_ALL}"
            export CI_SOURCE="${CI_SOURCE}"
            export CI_EVENT_NAME="${CI_EVENT_NAME}"
            export CI_DEPLOY_SERVICE="${CI_DEPLOY_SERVICE}"
            ./scripts/ci-deploy.sh

      - name: Deploy via SSH (attempt 3)
        if: vars.DEPLOY_RUNNER != 'self-hosted' && steps.ssh_deploy_1.outcome == 'failure' && steps.ssh_deploy_2.outcome == 'failure'
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_PAT: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 30m
          envs: GHCR_PAT,GHCR_USER,CI_PIN_TAG,CI_PIN_ALL,CI_SOURCE,CI_EVENT_NAME,CI_DEPLOY_SERVICE
          script: |
            sleep 90
            set -euo pipefail
            export DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
            cd "${DEPLOY_PATH}"
            git fetch origin main
            git reset --hard origin/main
            chmod +x scripts/*.sh certbot/*.sh
            export CI_PIN_TAG="${CI_PIN_TAG}"
            export CI_PIN_ALL="${CI_PIN_ALL}"
            export CI_SOURCE="${CI_SOURCE}"
            export CI_EVENT_NAME="${CI_EVENT_NAME}"
            export CI_DEPLOY_SERVICE="${CI_DEPLOY_SERVICE}"
            ./scripts/ci-deploy.sh

      - name: SSH deploy failed — pull-deploy fallback note
        if: vars.DEPLOY_RUNNER != 'self-hosted' && failure() && (steps.ssh_deploy_1.outcome == 'failure')
        run: |
          echo "::warning::GitHub Actions could not SSH to the VPS (port 22 timeout)."
          echo "If scripts/setup-pull-deploy.sh is installed on the VPS, main-branch"
          echo "changes (including .env image pins) will auto-deploy within ~2 minutes."
          echo "Permanent fix: install the self-hosted runner (scripts/install-github-runner.sh)"
          echo "and set repo variable DEPLOY_RUNNER=self-hosted."

      - name: Smoke tests
        run: |
          set -euo pipefail
          SERVICES="${{ steps.resolve.outputs.services }}"

          declare -A URLS=(
            ["portal"]="https://papermantra.com/healthz"
            ["website"]="https://www.neelmind.com/"
            ["api"]="https://api.papermantra.com/papermantra/actuator/health"
            ["pdf"]="https://pdf.papermantra.com/pdfgenerator/actuator/health"
          )

          IFS=',' read -r -a SVC_ARRAY <<< "${SERVICES}"
          for svc in "${SVC_ARRAY[@]}"; do
            svc="$(echo "${svc}" | xargs)"
            url="${URLS[$svc]:-}"
            if [[ -z "${url}" ]]; then
              echo "Skipping unknown service: ${svc}"
              continue
            fi

            attempts=6
            sleep_secs=15
            if [[ "${svc}" == "pdf" ]]; then
              attempts=12
              sleep_secs=15
            fi

            echo "Checking ${svc} (${url})..."
            for i in $(seq 1 "${attempts}"); do
              if curl -fsS "${url}" >/dev/null; then
                echo "  OK"
                break
              fi
              if [[ "${i}" -eq "${attempts}" ]]; then
                echo "  FAILED after ${attempts} attempts"
                exit 1
              fi
              sleep "${sleep_secs}"
            done
          done

      - name: Notify on failure
        if: failure()
        run: |
          echo "Infra deployment failed for commit ${{ github.sha }}"
          echo "Check VPS logs: docker compose -f ${{ env.DEPLOY_PATH }}/docker-compose.yml logs --tail=100"
