# =============================================================================
# Deploy papermantra-infra to the production VPS.
#
# Triggered by:
#   • push to main (infra config changes)
#   • workflow_dispatch (manual redeploy)
#   • repository_dispatch from app repos (optional image tag bump)
#
# Required GitHub Secrets:
#   PROD_SSH_HOST, PROD_SSH_USER, PROD_SSH_KEY
#   GHCR_TOKEN (read packages — PAT or fine-grained token)
#
# Optional repository variables:
#   INFRA_DEPLOY_PATH  default: /opt/papermantra-infra
# =============================================================================

name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'docker-compose*.yml'
      - '.env'
      - 'nginx/**'
      - 'certbot/**'
      - 'scripts/**'
      - 'monitoring/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to pin (e.g. v1.0.6). Leave empty to deploy current .env tags.'
        required: false
        default: ''
      pin_all:
        description: 'Pin ALL services to image_tag (unified release). If false, use deploy_service only.'
        type: boolean
        required: false
        default: false
      deploy_service:
        description: 'Single service when pin_all=false (portal|website|api|pdf). Ignored when pin_all=true.'
        required: false
        default: 'all'
  repository_dispatch:
    types: [deploy-infra]

concurrency:
  group: papermantra-infra-deploy
  cancel-in-progress: false

env:
  DEPLOY_PATH: ${{ vars.INFRA_DEPLOY_PATH || '/opt/papermantra-infra' }}

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://papermantra.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deploy services
        id: resolve
        run: |
          set -euo pipefail
          SOURCE="${{ github.event.client_payload.source || 'manual' }}"
          PIN_TAG="${{ github.event.inputs.image_tag || github.event.client_payload.pin_tag || github.event.client_payload.version || '' }}"
          PIN_ALL="${{ github.event.inputs.pin_all || github.event.client_payload.pin_all || 'false' }}"
          EVENT_NAME="${{ github.event_name }}"
          DEPLOY_SERVICE_INPUT="${{ github.event.inputs.deploy_service || 'all' }}"

          SERVICES="portal,website,api,pdf"

          if [[ "${SOURCE}" == "manual" && -z "${PIN_TAG}" ]]; then
            if [[ "${EVENT_NAME}" == "push" ]]; then
              DETECTED="$(./scripts/resolve-deploy-services.sh)"
              if [[ -n "${DETECTED}" ]]; then
                SERVICES="${DETECTED}"
              fi
            elif [[ "${DEPLOY_SERVICE_INPUT}" != "all" && -n "${DEPLOY_SERVICE_INPUT}" ]]; then
              SERVICES="${DEPLOY_SERVICE_INPUT}"
            fi
          elif [[ -n "${PIN_TAG}" ]]; then
            if [[ "${PIN_ALL}" == "true" ]]; then
              SERVICES="portal,website,api,pdf"
            elif [[ "${SOURCE}" != "manual" ]]; then
              case "${SOURCE}" in
                papermantra) SERVICES="portal" ;;
                robofume) SERVICES="website" ;;
                papermantraservices) SERVICES="api" ;;
                pdfgenerator) SERVICES="pdf" ;;
              esac
            elif [[ "${DEPLOY_SERVICE_INPUT}" != "all" && -n "${DEPLOY_SERVICE_INPUT}" ]]; then
              SERVICES="${DEPLOY_SERVICE_INPUT}"
            fi
          fi

          echo "services=${SERVICES}" >> "${GITHUB_OUTPUT}"
          echo "Smoke tests will target: ${SERVICES}"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_PAT: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          timeout: 300s
          envs: GHCR_PAT,GHCR_USER
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
            PIN_TAG="${{ github.event.inputs.image_tag || github.event.client_payload.pin_tag || github.event.client_payload.version || '' }}"
            PIN_ALL="${{ github.event.inputs.pin_all || github.event.client_payload.pin_all || 'false' }}"
            SOURCE="${{ github.event.client_payload.source || 'manual' }}"

            if [[ ! -d "${DEPLOY_PATH}" ]]; then
              echo "Cloning infra repo to ${DEPLOY_PATH}..."
              sudo mkdir -p "$(dirname "${DEPLOY_PATH}")"
              sudo git clone https://github.com/${{ github.repository }}.git "${DEPLOY_PATH}"
              sudo chown -R "$(whoami):$(whoami)" "${DEPLOY_PATH}"
            fi

            cd "${DEPLOY_PATH}"
            git fetch origin main
            git reset --hard origin/main

            if [[ ! -f .env ]]; then
              echo "ERROR: ${DEPLOY_PATH}/.env is missing. Run git pull origin main (config is committed on main)."
              exit 1
            fi

            chmod +x scripts/*.sh certbot/*.sh
            echo ">> Recording pre-deploy image tags (for rollback)..."
            TIMESTAMP="$(date -u +"%Y%m%dT%H%M%SZ")"
            {
              echo "# ${TIMESTAMP}"
              grep '^IMAGE_' .env || true
            } >> .deploy-history

            DEPLOY_SERVICES="portal,website,api,pdf"

            if [[ "${SOURCE}" == "manual" && -z "${PIN_TAG}" ]]; then
              if [[ "${{ github.event_name }}" == "push" ]]; then
                DETECTED="$(./scripts/resolve-deploy-services.sh)"
                if [[ -n "${DETECTED}" ]]; then
                  DEPLOY_SERVICES="${DETECTED}"
                  echo ">> Auto-detected changed services from .env diff: ${DEPLOY_SERVICES}"
                fi
              elif [[ "${{ github.event.inputs.deploy_service }}" != "all" && -n "${{ github.event.inputs.deploy_service }}" ]]; then
                DEPLOY_SERVICES="${{ github.event.inputs.deploy_service }}"
                echo ">> Manual deploy limited to: ${DEPLOY_SERVICES}"
              fi
            fi

            if [[ -n "${PIN_TAG}" ]]; then
              if [[ "${PIN_ALL}" == "true" ]]; then
                echo "Unified release: pinning all IMAGE_* to ${PIN_TAG}"
                ./scripts/pin-image-tag.sh "${PIN_TAG}" --all
              elif [[ "${SOURCE}" != "manual" ]]; then
                echo "Per-service release: pinning ${SOURCE} to ${PIN_TAG}"
                ./scripts/pin-image-tag.sh "${PIN_TAG}" --source "${SOURCE}"
                case "${SOURCE}" in
                  papermantra) DEPLOY_SERVICES="portal" ;;
                  robofume) DEPLOY_SERVICES="website" ;;
                  papermantraservices) DEPLOY_SERVICES="api" ;;
                  pdfgenerator) DEPLOY_SERVICES="pdf" ;;
                esac
              elif [[ "${{ github.event.inputs.deploy_service }}" != "all" && -n "${{ github.event.inputs.deploy_service }}" ]]; then
                echo "Manual single-service pin: ${{ github.event.inputs.deploy_service }} -> ${PIN_TAG}"
                ./scripts/pin-image-tag.sh "${PIN_TAG}" --service "${{ github.event.inputs.deploy_service }}"
                DEPLOY_SERVICES="${{ github.event.inputs.deploy_service }}"
              fi
            fi

            if [[ -n "${GHCR_PAT:-}" ]]; then
              echo "${GHCR_PAT}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
            else
              echo "WARN: GHCR_TOKEN secret not set — assuming docker login already configured on VPS"
            fi

            echo "Deploy triggered by: ${SOURCE} (services: ${DEPLOY_SERVICES})"
            export DEPLOY_SERVICES
            ./scripts/deploy.sh --rollback-on-failure

      - name: Smoke tests
        run: |
          set -euo pipefail
          SERVICES="${{ steps.resolve.outputs.services }}"

          declare -A URLS=(
            ["portal"]="https://papermantra.com/healthz"
            ["website"]="https://www.neelmind.com/"
            ["api"]="https://api.papermantra.com/papermantra/actuator/health"
            ["pdf"]="https://pdf.papermantra.com/pdfgenerator/actuator/health"
          )

          IFS=',' read -r -a SVC_ARRAY <<< "${SERVICES}"
          for svc in "${SVC_ARRAY[@]}"; do
            svc="$(echo "${svc}" | xargs)"
            url="${URLS[$svc]:-}"
            if [[ -z "${url}" ]]; then
              echo "Skipping unknown service: ${svc}"
              continue
            fi

            attempts=6
            sleep_secs=15
            if [[ "${svc}" == "pdf" ]]; then
              attempts=12
              sleep_secs=15
            fi

            echo "Checking ${svc} (${url})..."
            for i in $(seq 1 "${attempts}"); do
              if curl -fsS "${url}" >/dev/null; then
                echo "  OK"
                break
              fi
              if [[ "${i}" -eq "${attempts}" ]]; then
                echo "  FAILED after ${attempts} attempts"
                exit 1
              fi
              sleep "${sleep_secs}"
            done
          done

      - name: Notify on failure
        if: failure()
        run: |
          echo "Infra deployment failed for commit ${{ github.sha }}"
          echo "Check VPS logs: docker compose -f ${{ env.DEPLOY_PATH }}/docker-compose.yml logs --tail=100"
