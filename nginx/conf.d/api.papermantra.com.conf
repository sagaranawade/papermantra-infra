# api.papermantra.com → Papermantra Services (context path /papermantra)
server {
    listen 80;
    server_name api.papermantra.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.papermantra.com;

    ssl_certificate     /etc/letsencrypt/live/api.papermantra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.papermantra.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;

    client_max_body_size 50m;
    limit_req zone=api_limit burst=60 nodelay;

    location / {
        set $upstream_api api:9091;
        proxy_pass http://$upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
