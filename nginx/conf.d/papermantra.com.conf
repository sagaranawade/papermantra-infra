# papermantra.com + www → React portal
server {
    listen 80;
    server_name papermantra.com www.papermantra.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name papermantra.com www.papermantra.com;

    ssl_certificate     /etc/letsencrypt/live/papermantra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/papermantra.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    limit_req zone=general_limit burst=80 nodelay;

    # OAuth callbacks must hit the API (not the React SPA). Legacy clients used www.papermantra.com.
    location /papermantra/oauth2/ {
        proxy_pass http://api:9091;
        proxy_http_version 1.1;
        proxy_set_header Host api.papermantra.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /papermantra/login/oauth2/ {
        proxy_pass http://api:9091;
        proxy_http_version 1.1;
        proxy_set_header Host api.papermantra.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location / {
        set $upstream_portal portal:8080;
        proxy_pass http://$upstream_portal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
