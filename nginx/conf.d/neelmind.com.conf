# neelmind.com + www → Robofume Next.js site
server {
    listen 80;
    server_name neelmind.com www.neelmind.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name neelmind.com www.neelmind.com;

    ssl_certificate     /etc/letsencrypt/live/neelmind.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/neelmind.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    limit_req zone=general_limit burst=80 nodelay;

    # OAuth must hit the API (robofume login + legacy clients).
    location /papermantra/api/public/ {
        proxy_pass http://api:9091/papermantra/api/public/;
        proxy_http_version 1.1;
        proxy_set_header Host api.papermantra.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /papermantra/oauth2/ {
        proxy_pass http://api:9091;
        proxy_http_version 1.1;
        proxy_set_header Host api.papermantra.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /papermantra/login/oauth2/ {
        proxy_pass http://api:9091;
        proxy_http_version 1.1;
        proxy_set_header Host api.papermantra.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location / {
        set $upstream_website website:3000;
        proxy_pass http://$upstream_website;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /_next/static/ {
        set $upstream_website website:3000;
        proxy_pass http://$upstream_website;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
